server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Default page
    location = / {
        try_files /index.html =404;
    }

    # Serve default error pages: /errors/{code}.html
    location ^~ /errors/ {
        alias /usr/share/nginx/html/errors/;
        add_header Cache-Control "no-cache" always;
    }

    # Serve per-site custom error pages: /custom-errors/{domain}/{code}.html
    location ^~ /custom-errors/ {
        alias /usr/share/nginx/html/custom-errors/;
        add_header Cache-Control "no-cache" always;
    }

    # Health check
    location = /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
