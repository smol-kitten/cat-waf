# ModSecurity jail configuration — reads WAF access logs for 403 blocks

[modsecurity]
enabled = true
filter = modsecurity
port = http,https
logpath = /mnt/logs/nginx/*-access.log
          /mnt/logs/nginx/access.log
maxretry = 10
findtime = 600
bantime = 3600
polltime = 10

[modsecurity-severe]
enabled = true
filter = modsecurity-severe
port = http,https
logpath = /mnt/logs/nginx/*-access.log
          /mnt/logs/nginx/access.log
maxretry = 3
findtime = 300
bantime = 86400
polltime = 10
