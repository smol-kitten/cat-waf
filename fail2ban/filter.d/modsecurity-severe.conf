# ModSecurity filter for severe/repeated attacks — shorter findtime, longer ban
# Matches repeated 403 blocks from the WAF access log

[Definition]
# Match 403 responses — same pattern as modsecurity.conf but with stricter thresholds in jail
failregex = ^\S+ \S+ <HOST> - \[.*\] "\S+ \S+ \S+" 403 .*$
            ^\S+ <HOST> \S+ - \[.*\] "\S+ \S+ \S+" 403 .*$

# Ignore Docker/internal networks
ignoreregex = ^.* 172\.(1[6-9]|2[0-9]|3[0-1])\..*$
              ^.* 10\..*$
              ^.* 192\.168\..*$
