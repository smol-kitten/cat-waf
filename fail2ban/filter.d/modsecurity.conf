# ModSecurity filter — matches blocked requests in the nginx WAF access log
# Log format: $host $http_x_real_ip $remote_addr - [$time_local] "METHOD /uri" STATUS ...
# Blocked requests return 403 from ModSecurity

[Definition]
# Match 403 responses (ModSecurity blocks)
failregex = ^\S+ \S+ <HOST> - \[.*\] "\S+ \S+ \S+" 403 .*$
            ^\S+ <HOST> \S+ - \[.*\] "\S+ \S+ \S+" 403 .*$

# Ignore Docker/internal networks
ignoreregex = ^.* 172\.(1[6-9]|2[0-9]|3[0-1])\..*$
              ^.* 10\..*$
              ^.* 192\.168\..*$
