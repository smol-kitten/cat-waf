# SQL Injection filter — matches 403 blocks in WAF access log where URI contains SQL patterns

[Definition]
# Match 403 responses with SQL-like URI patterns
failregex = ^\S+ \S+ <HOST> - \[.*\] "\S+ .*(?:union|select|insert|update|delete|drop|alter|create|exec|xp_).*" 403 .*$
            ^\S+ <HOST> \S+ - \[.*\] "\S+ .*(?:union|select|insert|update|delete|drop|alter|create|exec|xp_).*" 403 .*$

# Ignore Docker/internal networks
ignoreregex = ^.* 172\.(1[6-9]|2[0-9]|3[0-1])\..*$
              ^.* 10\..*$
              ^.* 192\.168\..*$
