# XSS Attack filter — matches 403 blocks in WAF access log where URI contains XSS patterns

[Definition]
# Match 403 responses with XSS-like URI patterns
failregex = ^\S+ \S+ <HOST> - \[.*\] "\S+ .*(?:<script|javascript:|onerror|onload|alert\().*" 403 .*$
            ^\S+ <HOST> \S+ - \[.*\] "\S+ .*(?:<script|javascript:|onerror|onload|alert\().*" 403 .*$

# Ignore Docker/internal networks
ignoreregex = ^.* 172\.(1[6-9]|2[0-9]|3[0-1])\..*$
              ^.* 10\..*$
              ^.* 192\.168\..*$
