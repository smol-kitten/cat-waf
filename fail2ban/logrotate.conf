# Fail2ban's own logs only
# NOTE: nginx/modsec log rotation is handled by config-watcher.sh in the nginx container
/var/log/fail2ban/*.log {
    daily
    missingok
    rotate 7
    compress
    delaycompress
    notifempty
    create 0640 root root
    size 50M
    sharedscripts
    postrotate
        /usr/bin/fail2ban-client reload > /dev/null 2>&1 || true
    endscript
}
